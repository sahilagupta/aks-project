trigger:
- none

pool: aks_pool

variables:
  imageName: 'sam15.azurecr.io/first'

stages:

# ================= BUILD =================
- stage: buildstage
  displayName: build-stage
  jobs:
  - job: buildjob
    displayName: build-job
    steps:

    - task: Docker@2
      inputs:
        containerRegistry: 'acr-connection'
        repository: 'first'
        command: 'buildAndPush'
        Dockerfile: '**/Dockerfile'
        tags: |
          $(Build.BuildId)

    - task: CopyFiles@2
      inputs:
        SourceFolder: '$(Build.SourcesDirectory)/manifests'
        Contents: '*.yml'
        TargetFolder: '$(Build.ArtifactStagingDirectory)'

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'manifests'
        publishLocation: 'Container'

# ================= DEPLOY =================
- stage: deployStage
  displayName: deploy-stage
  dependsOn: buildstage

  jobs:
  - deployment: deploy
    displayName: deploy-to-aks
    environment: dev

    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: manifests

          # ✅ BEST PRACTICE: explicit image update
          - task: Kubernetes@1
            displayName: Update Image
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceEndpoint: 'k8s-connection'
              namespace: 'default'
              command: 'set'
              arguments: 'image deployment/project1 app-container=$(imageName):$(Build.BuildId)'

          # ✅ Verify rollout success
          - task: Kubernetes@1
            displayName: Rollout Status
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceEndpoint: 'k8s-connection'
              namespace: 'default'
              command: 'rollout'
              arguments: 'status deployment/project1'