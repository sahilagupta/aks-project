apiVersion: apps/v1
kind: Deployment

metadata:
  name: project1
  labels:
    app: myproject1

spec:
  replicas: 1

  selector:
    matchLabels:
      app: myproject1

  template:
    metadata:
      labels:
        app: myproject1

    spec:
      containers:
        - name: deployment-cont
          image: sam15.azurecr.io/first:v1

          ports:
            - containerPort: 80