apiVersion: apps/v1
kind: Deployment

metadata:
  name: project1
  labels:
    app: myproject1

spec:
  replicas: 1

  
   

  selector:
    matchLabels:
      app: myproject1

  template:
    metadata:
      labels:
        app: myproject1

    spec:
      containers:
      - name: app-container
        image: sam15.azurecr.io/first:v1

        imagePullPolicy: Always

        ports:
        - containerPort: 80

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
